<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statut - The New Valdoria</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border: 2px solid #333;
            border-radius: 15px;
            background-color: #252525;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            margin-bottom: 0.5rem;
            color: #f1c40f;
        }
        .ip {
            font-family: monospace;
            background: #000;
            padding: 5px 10px;
            border-radius: 5px;
            color: #ccc;
        }
        #status-box {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
        }
        .online {
            color: #2ecc71; /* Vert si ouvert */
        }
        .offline {
            color: #e74c3c; /* Rouge si fermé */
        }
        .loading {
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>The New Valdoria</h1>
        <p>IP : <span class="ip">151.240.100.21:25582</span></p>
        
        <div id="status-box" class="loading">
            Vérification du statut...
        </div>
    </div>

    <script>
        const ip = "151.240.100.21";
        const port = "25582";

        async function checkServer() {
            const statusBox = document.getElementById('status-box');
            try {
                // Utilisation de l'API mcapi.us pour checker le serveur
                const response = await fetch(`https://mcapi.us/server/status?ip=${ip}&port=${port}`);
                const data = await response.json();

                if (data.online) {
                    statusBox.innerHTML = "● SERVEUR OUVERT";
                    statusBox.className = "online";
                } else {
                    statusBox.innerHTML = "● SERVEUR FERMÉ";
                    statusBox.className = "offline";
                }
            } catch (error) {
                statusBox.innerHTML = "ERREUR DE CONNEXION";
                statusBox.className = "offline";
            }
        }

        // Vérifie au chargement
        checkServer();
        // Rafraîchit toutes les 60 secondes
        setInterval(checkServer, 60000);
    </script>
</body>
</html>
